<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0c0f;
    --surface: #14161b;
    --border: #1f222a;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --text: #e8eaf0;
    --muted: #5a5f70;
    --user-bg: #1a1d24;
    --ai-bg: #111318;
    --radius: 14px;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 15% 20%, rgba(232,255,71,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 85% 80%, rgba(71,200,255,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(11,12,15,0.85);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .model-badge {
    font-size: 0.7rem;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  #clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 5px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  #clear-btn:hover { color: var(--text); border-color: var(--muted); }

  /* API Key Banner */
  #api-banner {
    position: relative;
    z-index: 10;
    background: rgba(232,255,71,0.06);
    border-bottom: 1px solid rgba(232,255,71,0.15);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.78rem;
    color: rgba(232,255,71,0.7);
  }
  #api-banner.hidden { display: none; }
  #api-banner input {
    flex: 1;
    max-width: 380px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(232,255,71,0.2);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 6px 12px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  #api-banner input:focus { border-color: var(--accent); }
  #api-banner input::placeholder { color: var(--muted); }
  #save-key-btn {
    background: var(--accent);
    color: #0b0c0f;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.2s;
  }
  #save-key-btn:hover { opacity: 0.85; }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 0;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-wrapper {
    display: flex;
    gap: 16px;
    padding: 14px 28px;
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
    animation: fadeSlide 0.3s ease-out;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-wrapper.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  .avatar.ai {
    background: linear-gradient(135deg, #1a1d24, #1e2230);
    border: 1px solid var(--border);
    color: var(--accent);
  }

  .avatar.user {
    background: linear-gradient(135deg, rgba(232,255,71,0.15), rgba(71,200,255,0.1));
    border: 1px solid rgba(232,255,71,0.2);
    color: var(--accent);
  }

  .bubble {
    max-width: calc(100% - 60px);
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: 0.88rem;
    line-height: 1.7;
    position: relative;
  }

  .msg-wrapper.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg-wrapper.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(232,255,71,0.1);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .bubble code {
    background: rgba(255,255,255,0.06);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 0.85em;
    color: var(--accent2);
  }

  .bubble pre {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    overflow-x: auto;
    margin: 10px 0;
    font-size: 0.82rem;
    line-height: 1.6;
  }

  .bubble pre code {
    background: none;
    padding: 0;
    color: var(--accent2);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 6px 0;
  }
  .typing-indicator span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* Empty state */
  #empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  #empty-state.hidden { opacity: 0; }

  .empty-icon {
    font-size: 3rem;
    filter: grayscale(0.3);
  }

  .empty-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    text-align: center;
  }

  .empty-title span { color: var(--accent); }

  .empty-sub {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    max-width: 300px;
    line-height: 1.6;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 500px;
    pointer-events: all;
    margin-top: 8px;
  }

  .suggestion-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .suggestion-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.04);
  }

  /* Input area */
  #input-area {
    position: relative;
    z-index: 10;
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
    background: rgba(11,12,15,0.9);
    backdrop-filter: blur(12px);
  }

  .input-box {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    max-width: 860px;
    margin: 0 auto;
    transition: border-color 0.2s;
  }

  .input-box:focus-within {
    border-color: rgba(232,255,71,0.3);
  }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    line-height: 1.6;
    resize: none;
    max-height: 160px;
    overflow-y: auto;
    padding: 4px 0;
  }

  #user-input::placeholder { color: var(--muted); }
  #user-input::-webkit-scrollbar { display: none; }

  #send-btn {
    background: var(--accent);
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 9px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: #0b0c0f;
  }

  #send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 16px; height: 16px; }

  .input-hint {
    text-align: center;
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 8px;
    max-width: 860px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Scrollbar for textarea */
  #user-input::-webkit-scrollbar { width: 3px; }
  #user-input::-webkit-scrollbar-thumb { background: var(--border); }

  /* System prompt */
  #system-prompt-row {
    max-width: 860px;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #system-prompt-row label {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    letter-spacing: 0.04em;
  }
  #system-prompt {
    flex: 1;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    outline: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.74rem;
    padding: 3px 4px;
    transition: all 0.2s;
  }
  #system-prompt:focus { color: var(--text); border-color: rgba(232,255,71,0.3); }
  #system-prompt::placeholder { color: rgba(90,95,112,0.5); }

</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    AICHAT
  </div>
  <div class="header-right">
    <span class="model-badge">claude-sonnet-4-6</span>
    <button id="clear-btn">clear chat</button>
  </div>
</header>

<!-- API Key Banner -->
<div id="api-banner">
  <span>⚡ Enter your Anthropic API key to begin:</span>
  <input type="password" id="api-key-input" placeholder="sk-ant-..." />
  <button id="save-key-btn">Save</button>
</div>

<!-- Messages -->
<div id="messages">
  <div id="empty-state">
    <div class="empty-icon">✦</div>
    <div class="empty-title">Start a <span>conversation</span></div>
    <div class="empty-sub">Ask anything — your AI assistant is ready to help.</div>
    <div class="suggestions">
      <button class="suggestion-chip">Explain quantum computing</button>
      <button class="suggestion-chip">Write a Python function</button>
      <button class="suggestion-chip">Summarize a topic</button>
      <button class="suggestion-chip">Help me brainstorm</button>
    </div>
  </div>
</div>

<!-- Input Area -->
<div id="input-area">
  <div id="system-prompt-row">
    <label>SYSTEM ›</label>
    <input type="text" id="system-prompt" placeholder="You are a helpful assistant..." value="You are a helpful, concise, and friendly AI assistant."/>
  </div>
  <div class="input-box">
    <textarea id="user-input" rows="1" placeholder="Message AI..."></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for new line</div>
</div>

<script>
const API_URL = "https://api.anthropic.com/v1/messages";
const MODEL = "claude-sonnet-4-6";

let apiKey = localStorage.getItem("anthropic_api_key") || "";
let conversationHistory = [];

const apiBanner = document.getElementById("api-banner");
const apiKeyInput = document.getElementById("api-key-input");
const saveKeyBtn = document.getElementById("save-key-btn");
const messagesEl = document.getElementById("messages");
const emptyState = document.getElementById("empty-state");
const userInput = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const clearBtn = document.getElementById("clear-btn");
const systemPromptEl = document.getElementById("system-prompt");

// Init
if (apiKey) {
  apiBanner.classList.add("hidden");
}

saveKeyBtn.addEventListener("click", () => {
  const key = apiKeyInput.value.trim();
  if (!key) return;
  apiKey = key;
  localStorage.setItem("anthropic_api_key", key);
  apiBanner.classList.add("hidden");
});

// Auto-resize textarea
userInput.addEventListener("input", () => {
  userInput.style.height = "auto";
  userInput.style.height = Math.min(userInput.scrollHeight, 160) + "px";
});

// Send on Enter (Shift+Enter = newline)
userInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener("click", sendMessage);

clearBtn.addEventListener("click", () => {
  conversationHistory = [];
  const msgs = messagesEl.querySelectorAll(".msg-wrapper");
  msgs.forEach(m => m.remove());
  emptyState.classList.remove("hidden");
});

// Suggestion chips
document.querySelectorAll(".suggestion-chip").forEach(chip => {
  chip.addEventListener("click", () => {
    userInput.value = chip.textContent;
    userInput.dispatchEvent(new Event("input"));
    sendMessage();
  });
});

function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function formatMessage(text) {
  // Code blocks
  text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Newlines
  text = text.replace(/\n/g, '<br>');
  return text;
}

function addMessage(role, content) {
  emptyState.classList.add("hidden");

  const wrapper = document.createElement("div");
  wrapper.className = `msg-wrapper ${role}`;

  const avatar = document.createElement("div");
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === "ai" ? "AI" : "YOU";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = formatMessage(content);

  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  messagesEl.appendChild(wrapper);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  return bubble;
}

function addTypingIndicator() {
  emptyState.classList.add("hidden");
  const wrapper = document.createElement("div");
  wrapper.className = "msg-wrapper ai";
  wrapper.id = "typing-wrapper";

  const avatar = document.createElement("div");
  avatar.className = "avatar ai";
  avatar.textContent = "AI";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  messagesEl.appendChild(wrapper);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  return wrapper;
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  if (!apiKey) {
    apiBanner.classList.remove("hidden");
    apiKeyInput.focus();
    return;
  }

  // Clear input
  userInput.value = "";
  userInput.style.height = "auto";

  // Add user message
  addMessage("user", text);
  conversationHistory.push({ role: "user", content: text });

  // Disable input
  sendBtn.disabled = true;
  userInput.disabled = true;

  // Show typing indicator
  const typingEl = addTypingIndicator();

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1024,
        system: systemPromptEl.value || "You are a helpful assistant.",
        messages: conversationHistory
      })
    });

    typingEl.remove();

    if (!response.ok) {
      const err = await response.json();
      const errMsg = err.error?.message || `API error ${response.status}`;
      addMessage("ai", `⚠️ Error: ${escapeHtml(errMsg)}`);
      conversationHistory.pop();
      return;
    }

    const data = await response.json();
    const aiText = data.content?.[0]?.text || "(no response)";

    conversationHistory.push({ role: "assistant", content: aiText });
    addMessage("ai", aiText);

  } catch (err) {
    typingEl.remove();
    addMessage("ai", `⚠️ Network error: ${escapeHtml(err.message)}`);
    conversationHistory.pop();
  } finally {
    sendBtn.disabled = false;
    userInput.disabled = false;
    userInput.focus();
  }
}
</script>
</body>
</html>
