apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexushr-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexushr-frontend
  template:
    metadata:
      labels:
        app: nexushr-frontend
    spec:
      containers:
        - name: frontend
          image: nexushr-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: nexushr-frontend
